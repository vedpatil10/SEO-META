<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Meta Agent</title>
  <link rel="stylesheet" href="/public/styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="top-card">
      <div class="title-wrap">
        <p class="eyebrow">SEO Meta Agent</p>
        <h1>Generate metadata from the active Google Sheet tab.</h1>
      </div>
      <div class="top-actions">
        <div id="auth-badge" class="status-badge status-muted">Google not connected</div>
        <button id="connect-google" type="button">Connect Google</button>
        <button id="disconnect-google" type="button" class="secondary-button hidden">Disconnect</button>
      </div>
    </section>

    <section class="main-grid">
      <section class="panel form-panel">
        <div class="panel-head">
          <div>
            <p class="section-label">Sheet Input</p>
            <h2>Run Agent</h2>
          </div>
        </div>

        <form id="trigger-form" class="form-grid">
          <div class="field full">
            <label for="spreadsheetUrl">Google Sheet URL</label>
            <input
              id="spreadsheetUrl"
              name="spreadsheetUrl"
              type="url"
              placeholder="https://docs.google.com/spreadsheets/d/..."
              required
            />
          </div>

          <div class="actions full">
            <button id="submit-button" type="submit">Trigger SEO Agent</button>
            <button id="download-button" type="button" class="secondary-button hidden">Download CSV</button>
          </div>
        </form>
      </section>

      <aside id="progress-panel" class="panel progress-panel hidden">
        <div class="panel-head compact">
          <div>
            <p class="section-label">Progress</p>
            <h2>Live Status</h2>
          </div>
        </div>

        <div class="progress-grid">
          <div class="metric-card">
            <span class="metric-label">Started</span>
            <strong id="started-at">-</strong>
          </div>
          <div class="metric-card">
            <span class="metric-label">Processed</span>
            <strong id="processed-count">0</strong>
          </div>
          <div class="metric-card">
            <span class="metric-label">Remaining</span>
            <strong id="remaining-count">0</strong>
          </div>
          <div class="metric-card active-card">
            <span class="metric-label">Current Keyword</span>
            <strong id="current-keyword">-</strong>
          </div>
        </div>
      </aside>
    </section>

    <section class="panel results-panel">
      <div class="panel-head compact">
        <div>
          <p class="section-label">Output</p>
          <h2>Run Log</h2>
        </div>
      </div>
      <pre id="result" class="result" aria-live="polite">Connect Google, paste a Google Sheet URL, and run the agent.</pre>
    </section>
  </main>

  <script src="/public/app.js"></script>
</body>
</html>
