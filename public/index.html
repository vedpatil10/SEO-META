<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Meta Agent</title>
  <link rel="stylesheet" href="/public/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="app-card">
      <div class="topbar">
        <div>
          <p class="eyebrow">SEO Meta Agent</p>
          <h1>Generate SEO Meta Data</h1>
        </div>
        <div id="auth-badge" class="badge muted-badge">Google not connected</div>
      </div>

      <div class="auth-row">
        <button id="connect-google" type="button">Connect Google</button>
        <button id="disconnect-google" type="button" class="secondary-button hidden">Disconnect</button>
      </div>

      <form id="trigger-form" class="form-grid">
        <div class="field full">
          <label for="spreadsheetUrl">Google Sheet URL</label>
          <input
            id="spreadsheetUrl"
            name="spreadsheetUrl"
            type="url"
            placeholder="https://docs.google.com/spreadsheets/d/..."
            required
          />
        </div>

        <div class="field">
          <label for="sheetName">Sheet Name</label>
          <input
            id="sheetName"
            name="sheetName"
            type="text"
            value="Sheet1"
            placeholder="Sheet1"
          />
        </div>

        <div class="actions full">
          <button id="submit-button" type="submit">Trigger SEO Agent</button>
          <button id="download-button" type="button" class="secondary-button hidden">Download CSV</button>
        </div>
      </form>

      <div id="progress-panel" class="progress-panel hidden">
        <div class="progress-grid">
          <div class="metric">
            <span class="metric-label">Started</span>
            <strong id="started-at">-</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Processed</span>
            <strong id="processed-count">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Remaining</span>
            <strong id="remaining-count">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Current Keyword</span>
            <strong id="current-keyword">-</strong>
          </div>
        </div>
      </div>

      <pre id="result" class="result" aria-live="polite">Connect Google, then paste a Google Sheet URL.</pre>
    </section>
  </main>

  <script src="/public/app.js"></script>
</body>
</html>
